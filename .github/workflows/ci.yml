name: Build & Push Docker Images

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
  API_IMAGE: ${{ secrets.DOCKER_USERNAME }}/notipush-api
  WEB_IMAGE: ${{ secrets.DOCKER_USERNAME }}/notipush-web

jobs:
  # ---------------------------------------------------------------------------
  # Build & test Go backend
  # ---------------------------------------------------------------------------
  test-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: notipush-api/go.sum

      - name: Run tests
        working-directory: notipush-api
        run: go test ./... -v -race

      - name: Build check
        working-directory: notipush-api
        run: go build ./...

  # ---------------------------------------------------------------------------
  # Build & test Next.js frontend
  # ---------------------------------------------------------------------------
  test-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: notipush-web/package-lock.json

      - name: Install dependencies
        working-directory: notipush-web
        run: npm ci

      - name: Lint
        working-directory: notipush-web
        run: npm run lint

      - name: Build
        working-directory: notipush-web
        run: npm run build

  # ---------------------------------------------------------------------------
  # Push Docker images to Docker Hub (only on main/tags)
  # ---------------------------------------------------------------------------
  push-images:
    needs: [test-api, test-web]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Determine image tag
        id: tag
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
            echo "latest=true" >> $GITHUB_OUTPUT
          else
            echo "tag=sha-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
            echo "latest=true" >> $GITHUB_OUTPUT
          fi

      - name: Build & push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: notipush-api/Dockerfile
          push: true
          tags: |
            ${{ env.API_IMAGE }}:${{ steps.tag.outputs.tag }}
            ${{ steps.tag.outputs.latest == 'true' && format('{0}:latest', env.API_IMAGE) || '' }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

      - name: Build & push Web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: notipush-web/Dockerfile
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }}
          tags: |
            ${{ env.WEB_IMAGE }}:${{ steps.tag.outputs.tag }}
            ${{ steps.tag.outputs.latest == 'true' && format('{0}:latest', env.WEB_IMAGE) || '' }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

  # ---------------------------------------------------------------------------
  # Deploy to VPS via SSH
  # ---------------------------------------------------------------------------
  deploy:
    needs: push-images
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Sync config files
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "Caddyfile,docker-compose.prod.yml"
          target: ${{ vars.DEPLOY_DIR || '/opt/notipush' }}

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ${{ vars.DEPLOY_DIR || '/opt/notipush' }}
            
            # Pull latest images
            docker compose -f docker-compose.prod.yml pull api web worker
            
            # Restart services (zero-downtime: recreate only updated containers)
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            
            # Cleanup old images
            docker image prune -f
