# NotiPush - Nginx reverse proxy configuration
# Copy to: /etc/nginx/sites-available/notipush.conf
# Enable:  ln -s /etc/nginx/sites-available/notipush.conf /etc/nginx/sites-enabled/
# Test:    nginx -t && systemctl reload nginx

# Frontend dashboard
server {
    listen 80;
    server_name notipush.createam.io;

    location / {
        proxy_pass http://127.0.0.1:3050;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }
}

# API backend
server {
    listen 80;
    server_name notipush-api.createam.io;

    client_max_body_size 10M;

    location / {
        proxy_pass http://127.0.0.1:8050;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }
}
